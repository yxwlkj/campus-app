<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 页面标题 -->
  <title>校园生活助手 - 聊天+跑腿一体化平台</title>
  
  <!-- PWA 核心配置（关键） -->
  <link rel="manifest" href="/manifest.json">
  
  <!-- iOS 端 PWA 适配 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="#07c160">
  <meta name="apple-mobile-web-app-title" content="校园助手">
  <link rel="apple-touch-icon" href="/icon-192x192.png">
  
  <!-- Android 端 PWA 适配 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#07c160">
  
  <!-- 基础样式（可选，根据你的项目调整） -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      background-color: #ffffff;
    }
  </style>
</head>
<body>
  <!-- 你的项目根容器（根据你的前端框架调整，比如 React/Vue 的挂载点） -->
  <div id="root"></div>

  <!-- 可选：Service Worker 注册（支持离线访问） -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => {
            console.log('Service Worker 注册成功:', registration.scope);
          })
          .catch(error => {
            console.log('Service Worker 注册失败:', error);
          });
      });
    }
  </script>
</body>
</html>
